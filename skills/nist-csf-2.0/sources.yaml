# sources.yaml — NIST Cybersecurity Framework 2.0
# canonical_sources: authoritative artifacts. related_sources: supporting resources.
# expected_metadata patterns are conservative Python regex (case-insensitive).

canonical_sources:
  - id: csf2-cswp29-csrc
    url: "https://csrc.nist.gov/pubs/cswp/29/the-nist-cybersecurity-framework-csf-20/final"
    type: canonical
    format: html
    description: "CSF 2.0 (NIST CSWP 29) publication page (CSRC)."
    expected_metadata:
      title_contains: "Cybersecurity Framework"
      version_pattern: "CSF\\s*([0-9]+\\.[0-9]+)"
      date_pattern: "([A-Z][a-z]+ [0-9]{1,2}, [0-9]{4})"

  - id: csf-program-home
    url: "https://www.nist.gov/cyberframework"
    type: canonical
    format: html
    description: "NIST Cybersecurity Framework program home page."
    expected_metadata:
      title_contains: "Cybersecurity Framework"
      version_pattern: "CSF\\s*([0-9]+\\.[0-9]+)"

related_sources:
  - id: csf2-reference-tool
    url: "https://csrc.nist.gov/projects/cybersecurity-framework/filters"
    type: related
    format: html
    description: "CSF 2.0 Reference Tool (Core in browsable/exportable form)."
    expected_metadata:
      title_contains: "Cybersecurity Framework"

  - id: csf2-quick-start-guides
    url: "https://www.nist.gov/cyberframework/quick-start-guides"
    type: related
    format: html
    description: "CSF 2.0 Quick Start Guides (implementation resources)."
    expected_metadata:
      title_contains: "Quick Start"
